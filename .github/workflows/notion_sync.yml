name: Notion to Blog Sync

on:
  schedule:
    - cron: '*/15 * * * *' # 15분마다 실행 (UTC 기준)
  workflow_dispatch: # 수동으로도 버튼 눌러서 실행 가능하게 함

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python 12.py

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          
          # 1. 서버의 최신 변경사항을 가져와서 합칩니다 (충돌 방지 1단계)
          git pull origin master --rebase
          
          # 2. 모든 변경사항을 추가합니다 (_posts 폴더 등)
          git add .
          
          # 3. 변경 사항이 있을 때만 커밋을 진행합니다
          git commit -m "Auto-update from Notion" || echo "No changes to commit"
          
          # 4. 강제 푸시(--force)를 사용하여 서버의 상태를 로봇의 최신 장부로 덮어씁니다
          git push origin master --force
